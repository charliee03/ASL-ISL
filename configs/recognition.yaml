model:
  name: transformer
  num_frames: 32
  num_keypoints: 27
  d_model: 128
  nhead: 4
  num_encoder_layers: 3
  num_decoder_layers: 3
  dropout: 0.2

data:
  dataset: wlasl
  batch_size: 32
  num_workers: 4
  mirror_prob: 0.5
  rotation_range: 13
  squeeze_ratio: 0.15

training:
  epochs: 300
  lr: 0.0005
  weight_decay: 0.0005
  patience: 50
  checkpoint_dir: models/recognition

evaluation:
  metric: wer
