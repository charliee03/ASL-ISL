model:
  name: transformer
  num_frames: 16
  num_keypoints: 27
  d_model: 256
  nhead: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dropout: 0.1

data:
  dataset: wlasl
  batch_size: 32
  num_workers: 4
  mirror_prob: 0.5
  rotation_range: 13
  squeeze_ratio: 0.15

training:
  epochs: 100
  lr: 0.0001
  weight_decay: 0.0001
  scheduler_step: 10
  scheduler_gamma: 0.9
  checkpoint_dir: models/recognition

evaluation:
  metric: wer
